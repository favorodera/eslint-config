version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-patch']
    cooldown:
      semver-minor-days: 7
      semver-major-days: 7
    commit-message:
      prefix: chore
      include: scope  

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
      include: scope  